<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9 - Buttons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container my-5">

        <h1 class="text-center text-primary mb-5">
            Local Community Event Portal
        </h1>

        <div class="card shadow mb-5">

            <div class="card-header bg-primary text-white">
                Contextual Buttons
            </div>

            <div class="card-body d-flex flex-wrap gap-2">

                <button class="btn btn-primary">Primary</button>
                <button class="btn btn-secondary">Secondary</button>
                <button class="btn btn-success">Success</button>
                <button class="btn btn-danger">Danger</button>
                <button class="btn btn-warning">Warning</button>
                <button class="btn btn-info">Info</button>
                <button class="btn btn-light">Light</button>
                <button class="btn btn-dark">Dark</button>

            </div>

        </div>

        <div class="card shadow mb-5">

            <div class="card-header bg-success text-white">
                Outline Buttons
            </div>

            <div class="card-body d-flex flex-wrap gap-2">

                <button class="btn btn-outline-primary">Primary</button>
                <button class="btn btn-outline-secondary">Secondary</button>
                <button class="btn btn-outline-success">Success</button>
                <button class="btn btn-outline-danger">Danger</button>
                <button class="btn btn-outline-warning">Warning</button>
                <button class="btn btn-outline-info">Info</button>
                <button class="btn btn-outline-dark">Dark</button>

            </div>

        </div>

        <div class="card shadow mb-5">

            <div class="card-header bg-warning">
                Button Group
            </div>

            <div class="card-body">

                <div class="btn-group" role="group">

                    <button class="btn btn-primary">Home</button>
                    <button class="btn btn-success">Events</button>
                    <button class="btn btn-info">Gallery</button>
                    <button class="btn btn-danger">Contact</button>

                </div>

            </div>

        </div>

        <div class="card shadow">

            <div class="card-header bg-dark text-white">
                Toggle Buttons
            </div>

            <div class="card-body">

                <input type="checkbox" class="btn-check" id="music">

                <label class="btn btn-outline-primary me-2" for="music">
                    Music
                </label>

                <input type="checkbox" class="btn-check" id="food">

                <label class="btn btn-outline-success me-2" for="food">
                    Food
                </label>

                <input type="checkbox" class="btn-check" id="sports">

                <label class="btn btn-outline-danger" for="sports">
                    Sports
                </label>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
