<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 - Responsive Flexbox Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container my-5">

        <h1 class="text-center text-primary mb-4">
            Local Community Event Portal
        </h1>

        <nav class="d-flex flex-column flex-md-row justify-content-between align-items-center bg-dark text-white p-3 rounded mb-5">

            <h3 class="mb-3 mb-md-0">
                Community Portal
            </h3>

            <div class="d-flex flex-column flex-md-row gap-3">
                <a href="#" class="text-white text-decoration-none">Home</a>
                <a href="#" class="text-white text-decoration-none">Events</a>
                <a href="#" class="text-white text-decoration-none">Gallery</a>
                <a href="#" class="text-white text-decoration-none">Contact</a>
            </div>

        </nav>

        <div class="card shadow">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h4 class="card-title">
                        Music Festival
                    </h4>

                    <p class="card-text mb-0">
                        Join us for an exciting evening of live performances.
                    </p>
                </div>

                <button class="btn btn-primary">
                    Register
                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
