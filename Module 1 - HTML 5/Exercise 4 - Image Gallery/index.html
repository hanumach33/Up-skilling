<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        table { border-collapse: collapse; }
        td { padding: 10px; text-align: center; }
        .event-img {
            border: 3px solid #333;
            width: 150px;
            height: 100px;
        }
    </style>
</head>
<body>

    <h1>Community Event Gallery</h1>

    <table>
        <caption>Photos from recent community events</caption>
        <tr>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Festival"
                     alt="Summer Festival" title="Summer Festival 2026">
                <p>Summer Festival</p>
            </td>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Market"
                     alt="Farmers Market" title="Weekly Farmers Market">
                <p>Farmers Market</p>
            </td>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Parade"
                     alt="Community Parade" title="Annual Community Parade">
                <p>Community Parade</p>
            </td>
        </tr>
        <tr>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Cleanup"
                     alt="Park Cleanup" title="Neighborhood Park Cleanup">
                <p>Park Cleanup</p>
            </td>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Concert"
                     alt="Outdoor Concert" title="Summer Outdoor Concert">
                <p>Outdoor Concert</p>
            </td>
            <td>
                <img class="event-img" src="https://via.placeholder.com/150x100?text=Fair"
                     alt="Charity Fair" title="Annual Charity Fair">
                <p>Charity Fair</p>
            </td>
        </tr>
    </table>

</body>
</html>
