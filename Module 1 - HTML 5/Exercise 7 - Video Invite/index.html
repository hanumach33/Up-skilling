<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite</title>
</head>
<body>

    <h1>Event Promo Video</h1>

    <video width="400" controls oncanplay="document.getElementById('videoMsg').textContent = 'Video ready to play'">
        <source src="promo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <p id="videoMsg"></p>

    <h2>Event Registration</h2>
    <form id="inviteForm">
        <label for="guestName">Your Name</label>
        <input type="text" id="guestName" placeholder="Enter your name">
        <button type="button">Save</button>
    </form>

    <script>
        let formTouched = false;
        document.getElementById('guestName').addEventListener('input', () => formTouched = true);

        window.onbeforeunload = function () {
            if (formTouched) {
                return "You have unfinished changes. Are you sure you want to leave?";
            }
        };
    </script>

</body>
</html>
