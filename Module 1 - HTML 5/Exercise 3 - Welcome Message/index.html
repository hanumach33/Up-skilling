<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Message</title>
    <style>
        #welcomeBanner {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 2px 4px;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h2>Welcome back, Community Member!</h2>
        <p>
            Don't miss our
            <span style="color: red; font-weight: bold;">Special Offer</span>
            this week.
        </p>
    </div>

    <main>
        <p>Check out our <span class="highlight">Summer Festival</span>
           and <span class="highlight">Farmers Market</span> events this month.</p>
    </main>

</body>
</html>
