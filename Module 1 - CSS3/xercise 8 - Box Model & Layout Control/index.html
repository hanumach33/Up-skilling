<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Box Model & Layout Control</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live music and entertainment with your family.</p>
    </div>

    <div class="eventCard">
        <h2>Food Carnival</h2>
        <p>Experience delicious cuisines from around the city.</p>
    </div>

    <h2>Event Registration</h2>

    <input type="text" placeholder="Enter your name">

    <div class="hiddenBox">
        This box uses visibility: hidden.
    </div>

    <div class="noneBox">
        This box uses display: none.
    </div>

</body>

</html>
