<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7 - Table Styling</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <table>
        <thead>
            <tr>
                <th>Event ID</th>
                <th>Event Name</th>
                <th>Date</th>
                <th>Venue</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Music Festival</td>
                <td>15-Jul-2026</td>
                <td>City Park</td>
                <td>Open</td>
            </tr>

            <tr>
                <td>102</td>
                <td>Food Carnival</td>
                <td>20-Jul-2026</td>
                <td>Town Hall</td>
                <td>Open</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Marathon</td>
                <td>28-Jul-2026</td>
                <td>Central Stadium</td>
                <td>Closed</td>
            </tr>

            <tr>
                <td>104</td>
                <td>Tree Plantation</td>
                <td>05-Aug-2026</td>
                <td>Green Park</td>
                <td>Open</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
