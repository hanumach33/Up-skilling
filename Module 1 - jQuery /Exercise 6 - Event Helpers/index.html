<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 - Event Helpers</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            text-align: center;
        }

        #eventBox {
            width: 350px;
            height: 150px;
            line-height: 150px;
            margin: 30px auto;
            background-color: lightgray;
            border: 2px solid black;
            font-size: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <div id="eventBox">
        Interact With Me
    </div>

    <input
        type="text"
        id="name"
        placeholder="Type something">

    <p id="message"></p>

    <script src="main.js"></script>

</body>

</html>
